name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Use the latest *stable* release rather than a fixed version
          # number. A hard-pinned old version (e.g. 3.24.5, Dart 3.5.4)
          # previously broke the build because flutter_lints ^6.0.0 needs
          # Dart >=3.8.0 — newer than that pinned Flutter shipped. Staying
          # on "stable" avoids repeating that mismatch as pubspec.yaml's
          # own dependencies get upgraded over time.
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
