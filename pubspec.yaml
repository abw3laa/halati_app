name: halati
description: تطبيق حالاتي - حفظ حالات واتساب وتنزيل الوسائط
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions & Android Storage Access Framework
  permission_handler: ^12.0.3
  # SAF (Storage Access Framework) — required to read WhatsApp's
  # .Statuses folder on Android 11+, where plain File/Directory APIs can
  # no longer see other apps' media directories at all (scoped storage).
  #
  # History: this used to be `shared_storage`, discontinued on pub.dev
  # *and* its own Android build.gradle still calls the long-dead
  # `jcenter()` repository, unconditionally failing any build on a modern
  # Gradle/AGP (the error is inside the package's own build file, not
  # fixable from this project). A brief attempt at a single `saf` package
  # was dropped too: its pub.dev listing (publisher ivehement.com,
  # v1.0.4) and its GitHub repo (now under a different owner, jvoltci,
  # v2.1.0) had drifted out of sync enough that it wasn't clear which
  # version `flutter pub get` would actually resolve.
  #
  # saf_util + saf_stream (published together, single verified publisher
  # flutter-cavalry.com, both actively maintained) split the same
  # capability cleanly: saf_util for the folder picker/listing/stat/
  # thumbnails, saf_stream for actually reading/copying a file's bytes.
  saf_util: ^2.2.0
  saf_stream: ^0.12.3

  # Networking (for the direct-link downloader)
  dio: ^5.4.3+1

  # Media
  video_player: ^2.9.1
  photo_manager: ^3.8.3
  share_plus: ^13.2.1
  url_launcher: ^6.3.0
  flutter_localizations:
    sdk: flutter

  # In-app update (self-hosted, outside Google Play)
  package_info_plus: ^10.2.1
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B3D4C"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png
    - assets/icons/whatsapp.png
    - assets/icons/facebook.png
    - assets/icons/telegram.png
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700