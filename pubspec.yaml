name: halati
description: تطبيق حالاتي - حفظ حالات واتساب وتنزيل الوسائط
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions & Android Storage Access Framework
  permission_handler: ^12.0.3

  # Networking (for the direct-link downloader)
  dio: ^5.4.3+1

  # Media
  video_player: ^2.9.1
  photo_manager: ^3.8.3
  gallery_saver_plus: ^3.2.9
  share_plus: ^13.2.1
  url_launcher: ^6.3.0
  flutter_localizations:
    sdk: flutter

  # In-app update (self-hosted, outside Google Play)
  package_info_plus: ^10.2.1
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B3D4C"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png
    - assets/icons/whatsapp.png
    - assets/icons/facebook.png
    - assets/icons/telegram.png
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700